version: '3.3'

services:
  postgres_legacy:
    image: postgres:11
    container_name: postgres_legacy
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dataknow
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:



